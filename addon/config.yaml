---
name: TRMNL HA Bridge
version: "1.2.0"
slug: trmnl_ha_bridge
description: >-
  Serves Home Assistant weather, forecast and sensor data as TRMNL/Terminus
  JSON feeds for e-ink displays. Define any number of feeds entirely in the UI.
url: https://github.com/nsthompson/trmnl-ha-bridge
# Pre-built multi-arch image published by .github/workflows on push to main.
# The builder publishes per-arch images plus a multi-arch manifest at this name.
image: "ghcr.io/nsthompson/trmnl-ha-bridge"
# TRMNL/Terminus runs outside HA, so the feed must be reachable on the network.
arch:
  - aarch64
  - amd64
init: false

# Talk to Home Assistant Core through the Supervisor proxy
# (http://supervisor/core/api with $SUPERVISOR_TOKEN) — no user token needed.
homeassistant_api: true

# Config panel in the HA sidebar: pick entities from dropdowns (no typing).
# ingress_port is omitted — the Supervisor's default (8099) is what bridge.py binds.
ingress: true
panel_icon: mdi:bridge
panel_title: TRMNL Bridge

# Publish the feed port on the host so Terminus can poll it.
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: TRMNL/Terminus poll endpoint (serves /feeds/<slug>.json)

# ---------------------------------------------------------------------------
# Runtime options only. Feeds are managed in the Ingress config panel and stored
# in /data/feeds.json — they are no longer part of the add-on options.
# ---------------------------------------------------------------------------
options:
  cache_ttl: 300
  request_timeout: 10
  log_level: info

schema:
  cache_ttl: int(30,)
  request_timeout: int(1,120)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
