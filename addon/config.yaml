---
name: TRMNL HA Bridge
version: "1.1.0"
slug: trmnl_ha_bridge
description: >-
  Serves Home Assistant weather, forecast and sensor data as TRMNL/Terminus
  JSON feeds for e-ink displays. Define any number of feeds entirely in the UI.
url: https://github.com/nsthompson/trmnl-ha-bridge
# Pre-built multi-arch images published by .github/workflows on push to main.
# The {arch} placeholder is substituted per architecture by the HA builder.
image: "ghcr.io/nsthompson/{arch}-trmnl-ha-bridge"
# TRMNL/Terminus runs outside HA, so the feed must be reachable on the network.
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false

# Talk to Home Assistant Core through the Supervisor proxy
# (http://supervisor/core/api with $SUPERVISOR_TOKEN) — no user token needed.
homeassistant_api: true

# Config panel in the HA sidebar: pick entities from dropdowns (no typing).
ingress: true
ingress_port: 8099
panel_icon: mdi:bridge
panel_title: TRMNL Bridge

# Publish the feed port on the host so Terminus can poll it.
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: TRMNL/Terminus poll endpoint (serves /feeds/<slug>.json)

# ---------------------------------------------------------------------------
# Default options shown in the UI. Users add/remove feeds and sensors visually;
# the Supervisor writes their choices to /data/options.json.
# ---------------------------------------------------------------------------
options:
  cache_ttl: 300
  request_timeout: 10
  log_level: info
  feeds:
    - slug: main
      location: Home
      weather_entity: weather.forecast_home
      forecast_type: daily
      forecast_days: 4
      feels_like_entity: ""
      aqi_entity: sensor.air_quality_index
      sensors:
        - entity_id: sensor.living_room_temperature
          label: Living Room
      entities:
        - entity_id: sensor.solar_power
          label: Solar
          unit: W

schema:
  cache_ttl: int(30,)
  request_timeout: int(1,120)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  feeds:
    - slug: str
      type: "list(weather|sensors)?"
      location: "str?"
      weather_entity: "str?"
      forecast_type: "list(daily|hourly|twice_daily)?"
      forecast_days: "int(1,10)?"
      feels_like_entity: "str?"
      aqi_entity: "str?"
      sensors:
        - entity_id: str
          label: "str?"
          unit: "str?"
      entities:
        - entity_id: str
          label: "str?"
          unit: "str?"
