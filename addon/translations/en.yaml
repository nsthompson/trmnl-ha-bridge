---
configuration:
  cache_ttl:
    name: Cache TTL (seconds)
    description: >-
      How long a feed's data is cached before HA is queried again. E-ink
      refreshes slowly, so a few minutes keeps load off HA. Minimum 30.
  request_timeout:
    name: Request timeout (seconds)
    description: How long to wait for each Home Assistant API call.
  log_level:
    name: Log level
    description: Verbosity of the add-on log.
